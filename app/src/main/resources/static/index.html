<html lang="en">
<head>
    <title>A Simple SPA For Tasks</title>
    <script type="application/javascript">
        function fetchAndDisplayProducts() {
            fetchProducts()
                .then(products => displayProducts(products))
        }

        function fetchProducts() {
            return fetch(
                "/products",
                {
                    headers: {'Accept': 'application/json'}
                }
            ).then(resp => resp.json());
        }

        function displayProducts(products) {
            const productsTableBody = document.getElementById("tasksTableBody")
            products.forEach(task => {
                const newRow = productRow(task);
                productsTableBody.appendChild(newRow);
            });
        }

        function productRow(product) {
            return tr([
                td(product.name),
            ]);
        }

        function tr(children) {
            const node = document.createElement("tr");
            children.forEach(child => node.appendChild(child));
            return node;
        }

        function td(text) {
            const node = document.createElement("td");
            node.appendChild(document.createTextNode(text));
            return node;
        }
    </script>
</head>
<body>
<h1>Viewing Tasks Via JS</h1>
<form action="javascript:fetchAndDisplayProducts()">
    <input type="submit" value="View The Products">
</form>
<table>
    <thead>
    <tr>
        <th>Name</th>
        <th>Description</th>
        <th>Priority</th>
    </tr>
    </thead>
    <tbody id="tasksTableBody">
    </tbody>
</table>
</body>
</html>
